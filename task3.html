<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event PreventDefault</title>
</head>
<body>
    <h1>Event PreventDefault</h1>
    <form id="form">Username:
        <input type="text" placeholder="Enter name" id="name"><br>
        Password:
        <input type="password" placeholder="Enter password" id="pwd"><br><br>
        <button type="submit">Submit</button>
    </form>
<script>
    const form = document.querySelector('#form')
    const nameInput = document.querySelector('#name')
    const pwdInput = document.querySelector('#pwd')
    form.addEventListener("submit",(e)=>{
        e.preventDefault()
        const name = nameInput.value
        const password = pwdInput.value
        flag = false
        if(password.length >= 8 && password.length <= 10){
            flag = true
        }
        if(/[A-Z]/.test(password)){
            flag = true
        }
        if(flag){
            console.log("Password is valid!!")
        }
        else{
            console.log("Password is invalid. It should be 8 to 10 characters long with at least one capital letter")
        }
    })
</script>
</body>

</html>
